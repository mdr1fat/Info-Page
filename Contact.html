  <div class="bg-primary-subtle">
    <h2 class="text-center py-4">Contact Us</h2>

    <div class="container py-5">
      <form>
        <div class="mb-3">
          <label for="exampleInputEmail1" class="form-label">Your Name</label>
          <input type="text" class="form-control" id="name" aria-describedby="emailHelp">
        </div>

        <div class="mb-3">
          <label for="exampleInputEmail1" class="form-label">Your Email address</label>
          <input type="email" class="form-control" id="email" aria-describedby="emailHelp">
        </div>
        <div class="mb-3">
          <label for="exampleInputPassword1" class="form-label">Password</label>
          <input type="password" class="form-control" id="password">
        </div>
        <div class="mb-3 form-check">
          <input type="checkbox" class="form-check-input" id="exampleCheck1">
          <label class="form-check-label" for="checkbox">Check me out</label>
        </div>
        <button onclick="test()" type="submit" class="btn btn-primary">Submit</button>
      </form>
    </div>
  </div>

  <script>
    function test() {
      var a = document.getElementById('name').value.trim();
      var b = document.getElementById('email').value.trim();
      var c = document.getElementById('password').value.trim();
      var d = document.getElementById('checkbox');

      if (a == "" || b == "" || c == "" || !d.checked) {
        window.alert("invalid format");
      } else {
        window.alert("success format")
      }

    }

  </script>
